<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Team Dashboard — Humming Web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f2f2f0;--surface:#fff;--surface2:#f8f8f6;--surface-hover:#f0f0ee;--border:#e2e2de;--border-l:#d0d0cc;--accent:#1a1a1a;--accent-l:#333;--yellow:#fff200;--text:#1a1a1a;--text-m:#6b6b6b;--text-d:#999;--green:#1a8a5c;--red:#c0392b;--orange:#c27a00;--blue:#2563a8;--radius:10px;--radius-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-l);border-radius:8px}
.app{display:flex;height:100vh}
.sidebar{width:224px;background:var(--accent);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;background:var(--yellow);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000}
.brand-text h3{font-size:14px;font-weight:600;color:#fff;line-height:1.2}.brand-text span{font-size:11px;color:rgba(255,255,255,.5)}
.sidebar nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;margin-bottom:1px;background:transparent;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:400;color:rgba(255,255,255,.55);font-family:inherit;text-align:left;transition:all .12s}
.nav-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-btn.active{background:rgba(255,242,0,.12);color:var(--yellow);font-weight:600}
.nav-btn .icon{font-size:15px;width:20px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
.user-info{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.user-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000}
.user-meta .uname{font-size:12px;font-weight:500;color:#fff}.user-meta .urole{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.04em}
.btn-signout{width:100%;padding:6px 0;background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;font-family:inherit}
.btn-signout:hover{border-color:rgba(255,255,255,.3);color:#fff}
.main{flex:1;overflow-y:auto;padding:28px 32px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{width:380px;background:var(--surface);border-radius:16px;padding:40px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.04)}
.login-card .brand{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.login-card label{font-size:11px;color:var(--text-m);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.login-card input{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:inherit;margin-bottom:16px}
.login-card input:focus{border-color:var(--accent)}
.login-err{color:var(--red);font-size:13px;margin-bottom:10px}
.btn{font-family:inherit;cursor:pointer;font-size:13px;padding:8px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-m);font-weight:500;transition:all .12s}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.btn-primary:hover{background:var(--accent-l)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-sm{font-size:12px;padding:5px 12px;border-radius:var(--radius-sm)}
.btn-danger{color:var(--red);border-color:rgba(192,57,43,.25)}.btn-danger:hover{background:rgba(192,57,43,.06)}
.btn-save{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}.btn-save:hover{background:#157a50}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-hdr h2{font-size:20px;font-weight:600}.section-hdr .sub{font-size:13px;color:var(--text-m);margin-top:3px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface2)}
td{padding:12px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);max-width:220px;overflow:hidden;text-overflow:ellipsis}
tr.clickable{cursor:pointer;transition:background .08s}tr.clickable:hover{background:var(--surface-hover)}
.cell-name{font-weight:500}.cell-mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge .dot{width:6px;height:6px;border-radius:50%}
.badge-green{background:rgba(26,138,92,.1);color:var(--green)}.badge-green .dot{background:var(--green)}
.badge-orange{background:rgba(194,122,0,.1);color:var(--orange)}.badge-orange .dot{background:var(--orange)}
.badge-red{background:rgba(192,57,43,.08);color:var(--red)}.badge-red .dot{background:var(--red)}
.badge-blue{background:rgba(37,99,168,.08);color:var(--blue)}.badge-blue .dot{background:var(--blue)}
.badge-gray{background:rgba(107,107,107,.08);color:var(--text-m)}.badge-gray .dot{background:var(--text-m)}
.badge-dim{background:rgba(153,153,153,.08);color:var(--text-d)}.badge-dim .dot{background:var(--text-d)}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.metric-label{font-size:11px;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.metric-val{font-size:26px;font-weight:600}.metric-sub{font-size:11px;color:var(--text-d);margin-top:3px}
.overlay{position:fixed;inset:0;z-index:100;display:none;justify-content:flex-end}
.overlay.open{display:flex}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.25)}
.panel{position:relative;width:560px;max-width:92vw;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;animation:slideIn .2s ease;box-shadow:-8px 0 30px rgba(0,0,0,.06)}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.panel-hdr h3{font-size:16px;font-weight:600}.panel-close{background:none;border:none;color:var(--text-m);font-size:20px;cursor:pointer;padding:4px}
.panel-body{padding:20px}
.field{margin-bottom:14px}.field-label{font-size:11px;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}.field-val{font-size:13px;color:var(--text);line-height:1.5}
.ad-preview{margin:16px 0;padding:16px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.ad-preview .label{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;font-weight:600}
.ad-preview .body{font-size:13px;line-height:1.6;white-space:pre-wrap;margin-bottom:12px}
.ad-preview .below{border-top:1px solid var(--border);padding-top:10px;margin-top:10px}
.ad-preview .hl{font-size:14px;font-weight:600}.ad-preview .desc{font-size:12px;color:var(--text-m);margin-top:2px}
.ad-preview .cta-tag{display:inline-block;margin-top:8px;padding:4px 12px;background:rgba(26,26,26,.06);border:1px solid var(--border);border-radius:4px;font-size:11px;font-weight:600}
.copy-box{position:relative;margin:12px 0;padding:14px 44px 14px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;line-height:1.6;white-space:pre-wrap;cursor:pointer;transition:border-color .15s}
.copy-box:hover{border-color:var(--accent)}
.copy-icon{position:absolute;top:10px;right:10px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:4px;font-size:13px;color:var(--text-m);pointer-events:none}
.copy-box.copied{border-color:var(--green)}
.copy-box.copied .copy-icon{background:var(--green);color:#fff;border-color:var(--green)}
textarea.perf-input{width:100%;min-height:180px;padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;resize:vertical;outline:none;line-height:1.6}
textarea.perf-input:focus{border-color:var(--accent)}
.result-box{margin-top:16px;padding:16px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.result-box .rlabel{font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.result-box pre{font-size:13px;line-height:1.6;white-space:pre-wrap;font-family:'Outfit',sans-serif}
.loader-wrap{padding:60px;text-align:center}
.spinner{display:inline-block;width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{margin-top:12px;font-size:13px;color:var(--text-m)}
.empty{padding:40px;text-align:center;color:var(--text-m);font-size:13px}
.edit-row{margin-bottom:14px}
.edit-row label{font-size:11px;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
.edit-row input,.edit-row select,.edit-row textarea{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.edit-row input:focus,.edit-row select:focus,.edit-row textarea:focus{border-color:var(--accent)}
.edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.search-bar{display:flex;gap:10px;margin-bottom:16px}
.search-bar input{flex:1;padding:9px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;font-family:inherit;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.search-bar input:focus{border-color:var(--accent)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;animation:toastIn .3s ease;font-family:'Outfit',sans-serif}
.toast-ok{background:var(--green);color:#fff}.toast-err{background:var(--red);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media(max-width:768px){.sidebar{width:60px}.sidebar nav .nav-label,.brand-text,.sidebar-footer .user-meta,.sidebar-footer .btn-signout{display:none}.sidebar-brand{padding:14px 8px;justify-content:center}.nav-btn{justify-content:center;padding:10px}.nav-btn .icon{width:auto}.sidebar-footer{padding:10px;text-align:center}.sidebar-footer .user-avatar{margin:0 auto}.main{padding:16px}}
</style>
</head>
<body>
<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="brand"><div class="brand-icon">HW</div><div><div style="font-size:18px;font-weight:600">Team Dashboard</div><div style="font-size:12px;color:var(--text-m)">Humming Web</div></div></div>
    <label>Email</label><input type="email" id="loginEmail" placeholder="you@hummingweb.com.au">
    <label>Password</label><input type="password" id="loginPass" placeholder="••••••••">
    <div id="loginErr" class="login-err" style="display:none"></div>
    <button class="btn btn-primary" style="width:100%;padding:12px 0;font-size:14px" id="loginBtn">Sign In</button>
  </div>
</div>
<div id="appShell" class="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">HW</div><div class="brand-text"><h3>Humming Web</h3><span>Team Dashboard</span></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar" id="userAvatar"></div><div class="user-meta"><div class="uname" id="userName"></div><div class="urole" id="userRole"></div></div></div><button class="btn-signout" id="signoutBtn">Sign Out</button></div>
  </div>
  <main class="main" id="mainContent"></main>
</div>
<div class="overlay" id="detailOverlay">
  <div class="overlay-bg" id="overlayBg"></div>
  <div class="panel"><div class="panel-hdr"><h3 id="panelTitle"></h3><button class="panel-close" id="panelCloseBtn">✕</button></div><div class="panel-body" id="panelBody"></div></div>
</div>
<script>
// ── All event listeners via JS, zero inline handlers ──
// This avoids ALL CSP issues with Cloudflare Workers

var API='https://n8n.hummingweb.com.au/webhook';
var EP={clients:API+'/team-dashboard-clients',campaigns:API+'/team-dashboard-campaigns',adsets:API+'/team-dashboard-adsets',adcopy:API+'/team-dashboard-adcopy',gadgroups:API+'/team-dashboard-gadgroups',gadcopy:API+'/team-dashboard-gadcopy',gkeywords:API+'/team-dashboard-gkeywords',update:API+'/team-dashboard-update',del:API+'/team-dashboard-delete'};
var USERS=[{email:'subhash@hummingweb.com.au',password:'hw2026!',name:'Subhash',role:'admin'},{email:'team@hummingweb.com.au',password:'team2026',name:'Team Member',role:'team'}];
var SECTS=[{id:'overview',label:'Overview',icon:'\u25C8'},{id:'clients',label:'Clients',icon:'\u25CE'},{id:'campaigns',label:'Campaigns',icon:'\u25B8'},{id:'adsets',label:'Ad Sets',icon:'\u25C7'},{id:'adcopy',label:'Ad Copy',icon:'\u270E'},{id:'performance',label:'Performance',icon:'\u2197'},{id:'gadgroups',label:'G. Ad Groups',icon:'\u25A3'},{id:'gadcopy',label:'G. Ad Copy',icon:'\u270D'},{id:'gkeywords',label:'G. Keywords',icon:'\u2263'}];
var SM={Active:'green',Live:'green',Approved:'green',Paused:'orange','In Review':'orange',Draft:'gray',Completed:'blue',Planning:'blue',Onboarding:'blue',Churned:'red',Killed:'red',Rejected:'red','Changes Needed':'orange',Lead:'dim'};

var user=null,sec='overview',cache={clients:null,campaigns:null,adsets:null,adcopy:null,gadgroups:null,gadcopy:null,gkeywords:null},srch={clients:'',campaigns:'',adsets:'',adcopy:'',gadgroups:'',gadcopy:'',gkeywords:''};
var filters={campaignClient:'',campaignPlatform:'',adsetClient:'',adcopyClient:'',adcopyCampaign:'',adcopyAdset:'',perfClient:'',gagClient:'',gagCampaign:'',gacClient:'',gacAdGroup:'',gkwClient:'',gkwAdGroup:''};
var RD={};
function sr(o){RD[o.id]=o;return o.id;}
function gr(id){return RD[id];}

// Name resolution helpers — resolve relation IDs to names using cached data
function resolveClient(ids){
  if(!ids||!ids.length||!cache.clients)return '';
  for(var i=0;i<cache.clients.length;i++){if(ids.indexOf(cache.clients[i].id)>-1)return cache.clients[i].name;}
  return '';
}
function resolveCampaign(ids){
  if(!ids||!ids.length||!cache.campaigns)return '';
  for(var i=0;i<cache.campaigns.length;i++){if(ids.indexOf(cache.campaigns[i].id)>-1)return cache.campaigns[i].name;}
  return '';
}
function resolveAdSet(ids){
  if(!ids||!ids.length||!cache.adsets)return '';
  for(var i=0;i<cache.adsets.length;i++){if(ids.indexOf(cache.adsets[i].id)>-1)return cache.adsets[i].name;}
  return '';
}
function resolveGAdGroup(ids){
  if(!ids||!ids.length||!cache.gadgroups)return '';
  for(var i=0;i<cache.gadgroups.length;i++){if(ids.indexOf(cache.gadgroups[i].id)>-1)return cache.gadgroups[i].name;}
  return '';
}
function getUniqueClients(items){
  var seen={},list=[];
  for(var i=0;i<items.length;i++){
    var name=resolveClient(items[i].clientIds);
    if(name&&!seen[name]){seen[name]=true;list.push(name);}
  }
  list.sort();return list;
}
function clientFilter(filterKey,clients){
  var h='<select data-filter="'+filterKey+'" style="padding:7px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);font-family:inherit;cursor:pointer;min-width:160px">';
  h+='<option value="">All Clients</option>';
  for(var i=0;i<clients.length;i++){h+='<option'+(filters[filterKey]===clients[i]?' selected':'')+'>'+esc(clients[i])+'</option>';}
  h+='</select>';return h;
}

// Toast
function toast(m,ok){
  if(ok===undefined)ok=true;
  var t=document.createElement('div');
  t.className='toast '+(ok?'toast-ok':'toast-err');
  t.textContent=m;
  document.body.appendChild(t);
  window.setTimeout(function(){t.remove();},2500);
}

// ── Auth ──
document.getElementById('loginBtn').addEventListener('click',doLogin);
document.getElementById('loginEmail').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('signoutBtn').addEventListener('click',doLogout);
document.getElementById('overlayBg').addEventListener('click',closePanel);
document.getElementById('panelCloseBtn').addEventListener('click',closePanel);

function doLogin(){
  var e=document.getElementById('loginEmail').value.trim();
  var p=document.getElementById('loginPass').value;
  var err=document.getElementById('loginErr');
  var btn=document.getElementById('loginBtn');
  btn.textContent='Signing in...';btn.disabled=true;err.style.display='none';
  window.setTimeout(function(){
    var u=null;
    for(var i=0;i<USERS.length;i++){if(USERS[i].email===e&&USERS[i].password===p){u=USERS[i];break;}}
    if(u){user=u;showApp();}
    else{err.textContent='Invalid credentials';err.style.display='block';btn.textContent='Sign In';btn.disabled=false;}
  },400);
}
function doLogout(){
  user=null;cache={clients:null,campaigns:null,adsets:null,adcopy:null,gadgroups:null,gadcopy:null,gkeywords:null};
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginEmail').value='';document.getElementById('loginPass').value='';
}
function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='flex';
  document.getElementById('userName').textContent=user.name;
  document.getElementById('userRole').textContent=user.role;
  var a=document.getElementById('userAvatar');a.textContent=user.name[0];
  a.style.background=user.role==='admin'?'var(--yellow)':'#6ea8fe';
  buildNav();go('overview');
}
function buildNav(){
  var nav=document.getElementById('sidebarNav');
  nav.innerHTML='';
  for(var i=0;i<SECTS.length;i++){
    var s=SECTS[i];
    var btn=document.createElement('button');
    btn.className='nav-btn'+(s.id===sec?' active':'');
    btn.innerHTML='<span class="icon">'+s.icon+'</span><span class="nav-label">'+s.label+'</span>';
    btn.setAttribute('data-sec',s.id);
    btn.addEventListener('click',function(){go(this.getAttribute('data-sec'));});
    nav.appendChild(btn);
  }
}
function go(s){sec=s;buildNav();render();}

// ── Data ──
function fd(t){
  if(cache[t])return Promise.resolve(cache[t]);
  return fetch(EP[t]).then(function(r){return r.json();}).then(function(d){
    cache[t]=Array.isArray(d)?d:[];return cache[t];
  }).catch(function(e){console.error(t,e);return[];});
}
function updateNotion(pid,props){
  var clean={};
  var keys=Object.keys(props);
  for(var i=0;i<keys.length;i++){
    var k=keys[i],v=props[k];
    if(v.type==='number'&&v.value==null)continue;
    if(v.type==='select'&&!v.value)continue;
    if(v.type==='rich_text'&&!v.value)continue;
    clean[k]=v;
  }
  if(!Object.keys(clean).length)return Promise.resolve({success:true});
  return fetch(EP.update,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pageId:pid,properties:clean})})
    .then(function(r){return r.json();})
    .then(function(j){return{success:!j.error};})
    .catch(function(e){console.error(e);return{success:false};});
}
function delNotion(pid){
  return fetch(EP.del,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pageId:pid})})
    .then(function(r){return r.json();}).catch(function(e){return{error:e.message};});
}

// ── Helpers ──
function bdg(s){if(!s)return'<span class="badge badge-dim"><span class="dot"></span>\u2014</span>';return'<span class="badge badge-'+(SM[s]||'gray')+'"><span class="dot"></span>'+s+'</span>';}
function dlr(v){return v!=null?'$'+Number(v).toLocaleString():'\u2014';}
function pct(v){return v!=null?v+'%':'\u2014';}
function nm(v){return v!=null?Number(v).toLocaleString():'\u2014';}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function mc(l,v,s){return'<div class="metric"><div class="metric-label">'+l+'</div><div class="metric-val">'+v+'</div>'+(s?'<div class="metric-sub">'+s+'</div>':'')+'</div>';}
function fr(l,v){return'<div class="field"><div class="field-label">'+l+'</div><div class="field-val">'+(esc(v)||'\u2014')+'</div></div>';}
function fb(l,s){return'<div class="field"><div class="field-label">'+l+'</div><div class="field-val">'+bdg(s)+'</div></div>';}
function ldr(){return'<div class="loader-wrap"><div class="spinner"></div><div class="loader-text">Loading from Notion...</div></div>';}

function openPanel(t,h){document.getElementById('panelTitle').textContent=t;document.getElementById('panelBody').innerHTML=h;document.getElementById('detailOverlay').classList.add('open');}
function closePanel(){document.getElementById('detailOverlay').classList.remove('open');}

// Delegate clicks on tables and search inputs
document.getElementById('mainContent').addEventListener('click',function(e){
  var row=e.target.closest('tr[data-id]');
  if(row){
    var id=row.getAttribute('data-id');
    var type=row.getAttribute('data-type');
    if(type==='client')showClient(id);
    else if(type==='campaign')showCampaign(id);
    else if(type==='adset')showAdSet(id);
    else if(type==='adcopy')showAdCopy(id);
    else if(type==='gadgroup')showGAdGroup(id);
    else if(type==='gadcopy')showGAdCopy(id);
    else if(type==='gkeyword')showGKeyword(id);
  }
  // Button delegates
  var btn=e.target.closest('button[data-action]');
  if(btn){
    var action=btn.getAttribute('data-action');
    var aid=btn.getAttribute('data-id');
    if(action==='refresh'){cache={clients:null,campaigns:null,adsets:null,adcopy:null,gadgroups:null,gadcopy:null,gkeywords:null};render();}
    else if(action==='new-adcopy')newAdCopyForm();
  }
});
document.getElementById('mainContent').addEventListener('input',function(e){
  if(e.target.hasAttribute('data-search')){
    var key=e.target.getAttribute('data-search');
    var val=e.target.value;
    var pos=e.target.selectionStart;
    srch[key]=val;
    // Debounce — wait 300ms after last keystroke
    if(window._searchTimer)clearTimeout(window._searchTimer);
    window._searchTimer=window.setTimeout(function(){
      render();
      // Restore focus and cursor position
      window.setTimeout(function(){
        var inp=document.querySelector('[data-search="'+key+'"]');
        if(inp){inp.focus();inp.setSelectionRange(pos,pos);}
      },10);
    },300);
  }
});
document.getElementById('mainContent').addEventListener('change',function(e){
  if(e.target.hasAttribute('data-filter')){
    var key=e.target.getAttribute('data-filter');
    filters[key]=e.target.value;
    // Cascade: if client changes, reset child filters
    if(key==='adcopyClient'){filters.adcopyCampaign='';filters.adcopyAdset='';}
    if(key==='adcopyCampaign'){filters.adcopyAdset='';}
    render();
  }
});

// ── Overview ──
function renderOverview(){
  var el=document.getElementById('mainContent');el.innerHTML=ldr();
  Promise.all([fd('clients'),fd('campaigns'),fd('adsets'),fd('adcopy')]).then(function(r){
    var cl=r[0],ca=r[1],as=r[2],ac=r[3];
    var acl=cl.filter(function(c){return c.status==='Active';}).length;
    var lca=ca.filter(function(c){return c.status==='Live';}).length;
    var las=as.filter(function(a){return a.status==='Live';}).length;
    var ts=0,tc=0;for(var i=0;i<ca.length;i++){ts+=(ca[i].totalSpend||0);tc+=(ca[i].totalConversions||0);}
    var cads=ac.filter(function(a){return a.ctr;});
    var avgCTR='\u2014';if(cads.length){var s=0;for(var j=0;j<cads.length;j++)s+=cads[j].ctr;avgCTR=(s/cads.length).toFixed(2)+'%';}
    cads.sort(function(a,b){return(b.ctr||0)-(a.ctr||0);});var top=cads.slice(0,5);
    var h='<div class="section-hdr"><div><h2>Overview</h2><div class="sub">Your Meta Ads management at a glance</div></div><button class="btn btn-sm" data-action="refresh">\u21BB Refresh</button></div>';
    h+='<div class="metrics-grid">'+mc('Active Clients',acl,cl.length+' total')+mc('Live Campaigns',lca,ca.length+' total')+mc('Live Ad Sets',las,as.length+' total')+mc('Total Ads',ac.length,ac.filter(function(a){return a.status==='Live';}).length+' live')+mc('Total Spend',dlr(ts),'All campaigns')+mc('Conversions',nm(tc))+mc('Avg CTR',avgCTR,'All ads')+'</div>';
    if(top.length){
      h+='<h3 style="font-size:15px;font-weight:600;margin:24px 0 12px">Top Performing Ads</h3><div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Reference</th><th>Angle</th><th>CTR</th><th>CPA</th><th>ROAS</th><th>Conv</th><th>Status</th></tr></thead><tbody>';
      for(var k=0;k<top.length;k++){var a=top[k];sr(a);h+='<tr class="clickable" data-id="'+a.id+'" data-type="adcopy"><td class="cell-mono">'+esc(a.name)+'</td><td>'+esc(a.angle)+'</td><td>'+pct(a.ctr)+'</td><td>'+dlr(a.cpa)+'</td><td>'+(a.roas?a.roas+'x':'\u2014')+'</td><td>'+nm(a.conversions)+'</td><td>'+bdg(a.status)+'</td></tr>';}
      h+='</tbody></table></div></div>';
    }
    el.innerHTML=h;
  });
}

function showClient(id){var c=gr(id);if(!c)return;
  var h=fr('Business Name',c.businessName||c.name)+fr('Industry',c.industry)+fb('Status',c.status)+fr('Services',c.serviceType)+fr('Contact',c.contactName)+fr('Email',c.email)+fr('Phone',c.phone)+fr('Website',c.website)+fr('Location',c.location)+fr('Monthly Retainer',c.monthlyRetainer?dlr(c.monthlyRetainer)+' AUD':null)+fr('Start Date',c.startDate)+fr('Brand Voice',c.brandVoice)+fr('Compliance Notes',c.complianceNotes);

  openPanel(c.name,h);

    document.getElementById('pEditBtn').addEventListener('click',function(){editClient(id);});
    document.getElementById('pDelBtn').addEventListener('click',function(){confirmDel(id,'clients');});

}

// ── Ad Copy ──
function renderAdCopy(){var el=document.getElementById('mainContent');el.innerHTML=ldr();
  Promise.all([fd('adcopy'),fd('clients'),fd('campaigns'),fd('adsets')]).then(function(r){
  var d=r[0];
  var t=srch.adcopy?srch.adcopy.toLowerCase():'';
  var f=d;
  // Resolve names — ad copy links to ad set, which links to campaign and client
  for(var x=0;x<f.length;x++){
    var adset=null;
    if(f[x].adSetIds&&f[x].adSetIds.length){
      for(var y=0;y<(cache.adsets||[]).length;y++){
        if(f[x].adSetIds.indexOf(cache.adsets[y].id)>-1){adset=cache.adsets[y];break;}
      }
    }
    f[x]._adSet=adset?adset.name:'';
    f[x]._client=adset?resolveClient(adset.clientIds):'';
    f[x]._campaign=adset?resolveCampaign(adset.campaignIds):'';
  }
  // Apply filters
  if(filters.adcopyClient)f=f.filter(function(a){return a._client===filters.adcopyClient;});
  if(filters.adcopyCampaign)f=f.filter(function(a){return a._campaign===filters.adcopyCampaign;});
  if(filters.adcopyAdset)f=f.filter(function(a){return a._adSet===filters.adcopyAdset;});
  // Apply search
  if(t)f=f.filter(function(a){return(a.name||'').toLowerCase().indexOf(t)>-1||(a.reference||'').toLowerCase().indexOf(t)>-1||(a.angle||'').toLowerCase().indexOf(t)>-1||(a.headline||'').toLowerCase().indexOf(t)>-1||(a.status||'').toLowerCase().indexOf(t)>-1||(a._client||'').toLowerCase().indexOf(t)>-1||(a._campaign||'').toLowerCase().indexOf(t)>-1;});
  // Build unique lists for filter dropdowns
  var allClients={},allCampaigns={},allAdSets={};
  for(var z=0;z<d.length;z++){
    if(d[z]._client)allClients[d[z]._client]=true;
    if(d[z]._campaign)allCampaigns[d[z]._campaign]=true;
    if(d[z]._adSet)allAdSets[d[z]._adSet]=true;
  }
  var clientList=Object.keys(allClients).sort();
  var campaignList=Object.keys(allCampaigns).sort();
  var adsetList=Object.keys(allAdSets).sort();
  // If client is filtered, narrow campaign and adset options
  if(filters.adcopyClient){
    campaignList=campaignList.filter(function(c){for(var i=0;i<d.length;i++){if(d[i]._client===filters.adcopyClient&&d[i]._campaign===c)return true;}return false;});
    adsetList=adsetList.filter(function(a){for(var i=0;i<d.length;i++){if(d[i]._client===filters.adcopyClient&&d[i]._adSet===a)return true;}return false;});
  }
  if(filters.adcopyCampaign){
    adsetList=adsetList.filter(function(a){for(var i=0;i<d.length;i++){if(d[i]._campaign===filters.adcopyCampaign&&d[i]._adSet===a)return true;}return false;});
  }
  function makeFilter(key,label,opts){
    var h='<select data-filter="'+key+'" style="padding:7px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);font-family:inherit;cursor:pointer;min-width:140px">';
    h+='<option value="">'+label+'</option>';
    for(var i=0;i<opts.length;i++){h+='<option'+(filters[key]===opts[i]?' selected':'')+'>'+esc(opts[i])+'</option>';}
    h+='</select>';return h;
  }
  var h='<div class="section-hdr"><div><h2>Ad Copy</h2><div class="sub">'+d.length+' ad variations'+(f.length!==d.length?' \u2014 showing '+f.length:'')+'</div></div><button class="btn btn-primary btn-sm" data-action="new-adcopy">+ New Ad</button></div>';
  h+='<div class="search-bar" style="flex-wrap:wrap"><input placeholder="Search by reference, angle, headline..." value="'+esc(srch.adcopy)+'" data-search="adcopy" style="min-width:200px">'+makeFilter('adcopyClient','All Clients',clientList)+makeFilter('adcopyCampaign','All Campaigns',campaignList)+makeFilter('adcopyAdset','All Ad Sets',adsetList)+'</div>';
  h+='<div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Reference</th><th>Client</th><th>Campaign</th><th>Ad Set</th><th>Headline</th><th>Status</th><th>CTR</th><th>Conv</th></tr></thead><tbody>';
  if(f.length){for(var i=0;i<f.length;i++){var a=f[i];sr(a);h+='<tr class="clickable" data-id="'+a.id+'" data-type="adcopy"><td class="cell-mono">'+esc(a.name)+'</td><td>'+esc(a._client)+'</td><td style="max-width:140px">'+esc(a._campaign)+'</td><td style="max-width:140px;font-size:12px">'+esc(a._adSet)+'</td><td style="max-width:160px">'+esc(a.headline)+'</td><td>'+bdg(a.status)+'</td><td>'+pct(a.ctr)+'</td><td>'+nm(a.conversions)+'</td></tr>';}}
  else h+='<tr><td colspan="8" class="empty">No ads</td></tr>';
  h+='</tbody></table></div></div>';el.innerHTML=h;});}

function showAdCopy(id){
  var a=gr(id);if(!a)return;

// ── Client Notification on Status Change ──
function findClientForAd(ad){
  // Trace: Ad Copy → Ad Set (via adSetIds) → Client (via clientIds)
  var clients=cache.clients||[];
  var adsets=cache.adsets||[];
  if(ad.adSetIds&&ad.adSetIds.length){
    for(var i=0;i<adsets.length;i++){
      if(ad.adSetIds.indexOf(adsets[i].id)>-1&&adsets[i].clientIds&&adsets[i].clientIds.length){
        for(var j=0;j<clients.length;j++){
          if(adsets[i].clientIds.indexOf(clients[j].id)>-1)return clients[j];
        }
      }
    }
  }
  // Fallback: try matching via campaigns
  var campaigns=cache.campaigns||[];
  if(ad.adSetIds&&ad.adSetIds.length){
    for(var k=0;k<adsets.length;k++){
      if(ad.adSetIds.indexOf(adsets[k].id)>-1&&adsets[k].campaignIds&&adsets[k].campaignIds.length){
        for(var m=0;m<campaigns.length;m++){
          if(adsets[k].campaignIds.indexOf(campaigns[m].id)>-1&&campaigns[m].clientIds&&campaigns[m].clientIds.length){
            for(var n=0;n<clients.length;n++){
              if(campaigns[m].clientIds.indexOf(clients[n].id)>-1)return clients[n];
            }
          }
        }
      }
    }
  }
  return null;
}

function notifyClient(ad,newStatus){
  // Load all data to find the client
  Promise.all([fd('clients'),fd('adsets'),fd('campaigns')]).then(function(){
    var client=findClientForAd(ad);
    if(!client||!client.email){
      console.warn('No client email found for ad:',ad.name);
      toast('Updated but no client email found for notification',false);
      return;
    }
    var payload={
      clientName:client.contactName||client.name,
      clientEmail:client.email,
      businessName:client.businessName||client.name,
      adName:ad.name,
      adHeadline:ad.headline||'',
      newStatus:newStatus,
      approvalUrl:''
    };
    // If status is In Review, include the approval portal link if client has a token
    fetch(API+'/team-dashboard-notify',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    }).then(function(r){return r.json();}).then(function(j){
      if(j.success)toast('Client notified via email');
      else console.warn('Notify failed:',j);
    }).catch(function(e){console.error('Notify error:',e);});
  });
}
