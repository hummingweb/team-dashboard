<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Team Dashboard — Humming Web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f2f0;--surface:#fff;--surface2:#f8f8f6;--surface-hover:#f0f0ee;
  --border:#e2e2de;--border-l:#d0d0cc;--yellow:#fff200;--yellow-bg:#000;
  --accent:#1a1a1a;--accent-light:#333;
  --text:#1a1a1a;--text-m:#6b6b6b;--text-d:#999;
  --green:#1a8a5c;--red:#c0392b;--orange:#c27a00;--blue:#2563a8;--purple:#7c3aed;
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-l);border-radius:8px}

.app{display:flex;height:100vh}
.sidebar{width:224px;background:var(--accent);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;background:var(--yellow);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000}
.brand-text h3{font-size:14px;font-weight:600;color:#fff;line-height:1.2}.brand-text span{font-size:11px;color:rgba(255,255,255,.5)}
.sidebar nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;margin-bottom:1px;background:transparent;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:400;color:rgba(255,255,255,.55);font-family:inherit;text-align:left;transition:all .12s}
.nav-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-btn.active{background:rgba(255,242,0,.12);color:var(--yellow);font-weight:600}
.nav-btn .icon{font-size:15px;width:20px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
.user-info{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.user-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000}
.user-meta .uname{font-size:12px;font-weight:500;color:#fff}.user-meta .urole{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.04em}
.btn-signout{width:100%;padding:6px 0;background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;font-family:inherit;transition:all .12s}
.btn-signout:hover{border-color:rgba(255,255,255,.3);color:#fff}

.main{flex:1;overflow-y:auto;padding:28px 32px}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{width:380px;background:var(--surface);border-radius:16px;padding:40px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.04)}
.login-card .brand{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.login-card label{font-size:11px;color:var(--text-m);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.login-card input{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:inherit;margin-bottom:16px;transition:border .15s}
.login-card input:focus{border-color:var(--accent)}
.login-err{color:var(--red);font-size:13px;margin-bottom:10px}

.btn{font-family:inherit;cursor:pointer;font-size:13px;padding:8px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-m);font-weight:500;transition:all .12s}
.btn:hover{background:var(--surface2);border-color:var(--border-l);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.btn-primary:hover{background:var(--accent-light)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-sm{font-size:12px;padding:5px 12px;border-radius:var(--radius-sm)}
.btn-danger{color:var(--red);border-color:rgba(192,57,43,.25)}.btn-danger:hover{background:rgba(192,57,43,.06)}
.btn-save{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}.btn-save:hover{background:#157a50}

.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-hdr h2{font-size:20px;font-weight:600;color:var(--text)}
.section-hdr .sub{font-size:13px;color:var(--text-m);margin-top:3px}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface2)}
td{padding:12px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);max-width:220px;overflow:hidden;text-overflow:ellipsis}
tr.clickable{cursor:pointer;transition:background .08s}tr.clickable:hover{background:var(--surface-hover)}
.cell-name{font-weight:500}.cell-mono{font-family:'JetBrains Mono',monospace;font-size:12px}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge .dot{width:6px;height:6px;border-radius:50%}
.badge-green{background:rgba(26,138,92,.1);color:var(--green)}.badge-green .dot{background:var(--green)}
.badge-orange{background:rgba(194,122,0,.1);color:var(--orange)}.badge-orange .dot{background:var(--orange)}
.badge-red{background:rgba(192,57,43,.08);color:var(--red)}.badge-red .dot{background:var(--red)}
.badge-blue{background:rgba(37,99,168,.08);color:var(--blue)}.badge-blue .dot{background:var(--blue)}
.badge-gray{background:rgba(107,107,107,.08);color:var(--text-m)}.badge-gray .dot{background:var(--text-m)}
.badge-dim{background:rgba(153,153,153,.08);color:var(--text-d)}.badge-dim .dot{background:var(--text-d)}

.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.metric-label{font-size:11px;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.metric-val{font-size:26px;font-weight:600;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text-d);margin-top:3px}

.overlay{position:fixed;inset:0;z-index:100;display:none;justify-content:flex-end}
.overlay.open{display:flex}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.25)}
.panel{position:relative;width:520px;max-width:92vw;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;animation:slideIn .2s ease;box-shadow:-8px 0 30px rgba(0,0,0,.06)}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.panel-hdr h3{font-size:16px;font-weight:600;color:var(--text)}
.panel-close{background:none;border:none;color:var(--text-m);font-size:20px;cursor:pointer;padding:4px}
.panel-body{padding:20px}
.field{margin-bottom:14px}.field-label{font-size:11px;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}.field-val{font-size:13px;color:var(--text);line-height:1.5}

.ad-preview{margin:16px 0;padding:16px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.ad-preview .label{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;font-weight:600}
.ad-preview .body{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;margin-bottom:12px}
.ad-preview .below{border-top:1px solid var(--border);padding-top:10px;margin-top:10px}
.ad-preview .hl{font-size:14px;font-weight:600;color:var(--text)}.ad-preview .desc{font-size:12px;color:var(--text-m);margin-top:2px}
.ad-preview .cta-tag{display:inline-block;margin-top:8px;padding:4px 12px;background:rgba(26,26,26,.06);color:var(--accent);border-radius:4px;font-size:11px;font-weight:600;border:1px solid var(--border)}

textarea.perf-input{width:100%;min-height:180px;padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;resize:vertical;outline:none;line-height:1.6}
textarea.perf-input:focus{border-color:var(--accent)}
.result-box{margin-top:16px;padding:16px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.result-box .rlabel{font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.result-box pre{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;font-family:'Outfit',sans-serif}

.loader-wrap{padding:60px;text-align:center}
.spinner{display:inline-block;width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{margin-top:12px;font-size:13px;color:var(--text-m)}
.empty{padding:40px;text-align:center;color:var(--text-m);font-size:13px}

.edit-row{margin-bottom:14px}
.edit-row label{font-size:11px;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
.edit-row input,.edit-row select,.edit-row textarea{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.edit-row input:focus,.edit-row select:focus,.edit-row textarea:focus{border-color:var(--accent)}
.edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

.search-bar{display:flex;gap:10px;margin-bottom:16px}
.search-bar input{flex:1;padding:9px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;font-family:inherit;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.search-bar input:focus{border-color:var(--accent)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;animation:toastIn .3s ease;font-family:'Outfit',sans-serif}
.toast-ok{background:var(--green);color:#fff}.toast-err{background:var(--red);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

@media(max-width:768px){
  .sidebar{width:60px}.sidebar nav .nav-label,.brand-text,.sidebar-footer .user-meta,.sidebar-footer .btn-signout{display:none}
  .sidebar-brand{padding:14px 8px;justify-content:center}
  .nav-btn{justify-content:center;padding:10px}.nav-btn .icon{width:auto}
  .sidebar-footer{padding:10px;text-align:center}.sidebar-footer .user-avatar{margin:0 auto}
  .main{padding:16px}
}
</style>
</head>
<body>

<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">HW</div>
      <div><div style="font-size:18px;font-weight:600">Team Dashboard</div><div style="font-size:12px;color:var(--text-m)">Humming Web</div></div>
    </div>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="you@hummingweb.com.au" onkeydown="if(event.key==='Enter')doLogin()">
    <label>Password</label>
    <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="loginErr" class="login-err" style="display:none"></div>
    <button class="btn btn-primary" style="width:100%;padding:12px 0;font-size:14px" onclick="doLogin()" id="loginBtn">Sign In</button>
  </div>
</div>

<div id="appShell" class="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">HW</div><div class="brand-text"><h3>Humming Web</h3><span>Team Dashboard</span></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info"><div class="user-avatar" id="userAvatar"></div><div class="user-meta"><div class="uname" id="userName"></div><div class="urole" id="userRole"></div></div></div>
      <button class="btn-signout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <main class="main" id="mainContent"></main>
</div>

<div class="overlay" id="detailOverlay">
  <div class="overlay-bg" onclick="closePanel()"></div>
  <div class="panel">
    <div class="panel-hdr"><h3 id="panelTitle"></h3><button class="panel-close" onclick="closePanel()">✕</button></div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

<script>
const API='https://n8n.hummingweb.com.au/webhook';
const EP={clients:API+'/team-dashboard-clients',campaigns:API+'/team-dashboard-campaigns',adsets:API+'/team-dashboard-adsets',adcopy:API+'/team-dashboard-adcopy',update:API+'/team-dashboard-update',del:API+'/team-dashboard-delete'};
const USERS=[{email:'subhash@hummingweb.com.au',password:'hw2026!',name:'Subhash',role:'admin'},{email:'team@hummingweb.com.au',password:'team2026',name:'Team Member',role:'team'}];
const SECTS=[{id:'overview',label:'Overview',icon:'◈'},{id:'clients',label:'Clients',icon:'◎'},{id:'campaigns',label:'Campaigns',icon:'▸'},{id:'adsets',label:'Ad Sets',icon:'◇'},{id:'adcopy',label:'Ad Copy',icon:'✎'},{id:'performance',label:'Performance',icon:'↗'}];
const SM={Active:'green',Live:'green',Approved:'green',Paused:'orange','In Review':'orange',Draft:'gray',Completed:'blue',Planning:'blue',Onboarding:'blue',Churned:'red',Killed:'red',Rejected:'red','Changes Needed':'orange',Lead:'dim'};

let user=null,sec='overview',cache={clients:null,campaigns:null,adsets:null,adcopy:null},srch={clients:'',campaigns:'',adsets:'',adcopy:''};
// Row data store — keeps full objects in JS, only IDs go to HTML
const RD={};
function sr(o){RD[o.id]=o;return o.id;}
function gr(id){return RD[id];}

function toast(m,ok=true){const t=document.createElement('div');t.className='toast '+(ok?'toast-ok':'toast-err');t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

// ── Auth ──
function doLogin(){const e=document.getElementById('loginEmail').value.trim(),p=document.getElementById('loginPass').value,err=document.getElementById('loginErr'),btn=document.getElementById('loginBtn');btn.textContent='Signing in...';btn.disabled=true;err.style.display='none';setTimeout(()=>{const u=USERS.find(u=>u.email===e&&u.password===p);if(u){user=u;showApp();}else{err.textContent='Invalid credentials';err.style.display='block';btn.textContent='Sign In';btn.disabled=false;}},400);}
function doLogout(){user=null;cache={clients:null,campaigns:null,adsets:null,adcopy:null};document.getElementById('appShell').style.display='none';document.getElementById('loginScreen').style.display='flex';document.getElementById('loginEmail').value='';document.getElementById('loginPass').value='';}
function showApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('appShell').style.display='flex';document.getElementById('userName').textContent=user.name;document.getElementById('userRole').textContent=user.role;const a=document.getElementById('userAvatar');a.textContent=user.name[0];a.style.background=user.role==='admin'?'var(--yellow)':'#6ea8fe';buildNav();go('overview');}
function buildNav(){document.getElementById('sidebarNav').innerHTML=SECTS.map(s=>`<button class="nav-btn${s.id===sec?' active':''}" onclick="go('${s.id}')"><span class="icon">${s.icon}</span><span class="nav-label">${s.label}</span></button>`).join('');}
function go(s){sec=s;buildNav();render();}

// ── Data ──
async function fd(t){if(cache[t])return cache[t];try{const r=await fetch(EP[t]);const d=await r.json();cache[t]=Array.isArray(d)?d:[];return cache[t];}catch(e){console.error(t,e);return[];}}
async function updateNotion(pid,props){
  const clean={};for(const[k,v] of Object.entries(props)){if(v.type==='number'&&v.value==null)continue;if(v.type==='select'&&!v.value)continue;clean[k]=v;}
  if(!Object.keys(clean).length)return{success:true};
  try{const r=await fetch(EP.update,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pageId:pid,properties:clean})});const j=await r.json();return{success:!j.error};}catch(e){console.error(e);return{success:false};}
}
async function delNotion(pid){try{const r=await fetch(EP.del,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pageId:pid})});return await r.json();}catch(e){return{error:e.message};}}

// ── Helpers ──
function bdg(s){if(!s)return'<span class="badge badge-dim"><span class="dot"></span>—</span>';return`<span class="badge badge-${SM[s]||'gray'}"><span class="dot"></span>${s}</span>`;}
function $(v){return v!=null?'$'+Number(v).toLocaleString():'—';}
function pct(v){return v!=null?v+'%':'—';}
function n(v){return v!=null?Number(v).toLocaleString():'—';}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function mc(l,v,s){return`<div class="metric"><div class="metric-label">${l}</div><div class="metric-val">${v}</div>${s?'<div class="metric-sub">'+s+'</div>':''}</div>`;}
function fr(l,v){return`<div class="field"><div class="field-label">${l}</div><div class="field-val">${esc(v)||'—'}</div></div>`;}
function fb(l,s){return`<div class="field"><div class="field-label">${l}</div><div class="field-val">${bdg(s)}</div></div>`;}
function ldr(){return'<div class="loader-wrap"><div class="spinner"></div><div class="loader-text">Loading from Notion...</div></div>';}
function sb(t,ph){return`<div class="search-bar"><input type="text" placeholder="${ph}" value="${esc(srch[t])}" oninput="srch['${t}']=this.value;render()"></div>`;}
function flt(d,t,k){if(!t)return d;const q=t.toLowerCase();return d.filter(r=>k.some(f=>(r[f]||'').toString().toLowerCase().includes(q)));}

function openPanel(t,h){document.getElementById('panelTitle').textContent=t;document.getElementById('panelBody').innerHTML=h;document.getElementById('detailOverlay').classList.add('open');}
function closePanel(){document.getElementById('detailOverlay').classList.remove('open');}

// ── Overview ──
async function renderOverview(){const el=document.getElementById('mainContent');el.innerHTML=ldr();
  const[cl,ca,as,ac]=await Promise.all([fd('clients'),fd('campaigns'),fd('adsets'),fd('adcopy')]);
  const acl=cl.filter(c=>c.status==='Active').length,lca=ca.filter(c=>c.status==='Live').length,las=as.filter(a=>a.status==='Live').length;
  const ts=ca.reduce((s,c)=>s+(c.totalSpend||0),0),tc=ca.reduce((s,c)=>s+(c.totalConversions||0),0);
  const cads=ac.filter(a=>a.ctr),avgCTR=cads.length?(cads.reduce((s,a)=>s+a.ctr,0)/cads.length).toFixed(2):'—';
  const top=cads.sort((a,b)=>(b.ctr||0)-(a.ctr||0)).slice(0,5);
  el.innerHTML=`<div class="section-hdr"><div><h2>Overview</h2><div class="sub">Your Meta Ads management at a glance</div></div><button class="btn btn-sm" onclick="cache={clients:null,campaigns:null,adsets:null,adcopy:null};render()">↻ Refresh</button></div>
    <div class="metrics-grid">${mc('Active Clients',acl,cl.length+' total')}${mc('Live Campaigns',lca,ca.length+' total')}${mc('Live Ad Sets',las,as.length+' total')}${mc('Total Ads',ac.length,ac.filter(a=>a.status==='Live').length+' live')}${mc('Total Spend',$(ts),'All campaigns')}${mc('Conversions',n(tc))}${mc('Avg CTR',avgCTR!=='—'?avgCTR+'%':'—','All ads')}</div>
    ${top.length?'<h3 style="font-size:15px;font-weight:600;margin:24px 0 12px">Top Performing Ads</h3><div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Reference</th><th>Angle</th><th>CTR</th><th>CPA</th><th>ROAS</th><th>Conv</th><th>Status</th></tr></thead><tbody>'+top.map(a=>`<tr class="clickable" onclick="go('adcopy')"><td class="cell-mono">${esc(a.name)}</td><td>${esc(a.angle)}</td><td>${pct(a.ctr)}</td><td>${$(a.cpa)}</td><td>${a.roas?a.roas+'x':'—'}</td><td>${n(a.conversions)}</td><td>${bdg(a.status)}</td></tr>`).join('')+'</tbody></table></div></div>':''}
    <h3 style="font-size:15px;font-weight:600;margin:24px 0 12px">Recent Clients</h3><div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Client</th><th>Industry</th><th>Services</th><th>Status</th><th>Retainer</th></tr></thead><tbody>${cl.slice(0,5).map(c=>`<tr class="clickable" onclick="go('clients')"><td class="cell-name">${esc(c.name)}</td><td>${esc(c.industry)}</td><td>${esc(c.serviceType)}</td><td>${bdg(c.status)}</td><td>${$(c.monthlyRetainer)}</td></tr>`).join('')}</tbody></table></div></div>`;
}

// ── Clients ──

function showAdCopy(id){

  if(a.isWinner)h+='<div style="margin-bottom:14px"><span class="badge badge-green" style="font-size:12px;padding:5px 14px">★ Winner</span></div>';
  h+='<div class="ad-preview"><div class="label">Ad Preview</div><div class="body">'+preview+'</div><div class="below"><div class="hl">'+esc(a.headline)+'</div><div class="desc">'+esc(a.description)+'</div>'+(a.ctaButton?'<span class="cta-tag">'+esc(a.ctaButton)+'</span>':'')+'</div></div>';
  h+=fr('Image Ref',a.imageRef)+fr('Hook Code',a.hookCode)+fr('Body Code',a.bodyCode)+fr('Headline Code',a.headlineCode)+fr('Testing Group',a.testingGroup);
  h+='<div class="metrics-grid" style="grid-template-columns:1fr 1fr">'+mc('CTR',pct(a.ctr))+mc('CPA',$(a.cpa))+mc('ROAS',a.roas?a.roas+'x':'—')+mc('Conversions',n(a.conversions))+'</div>';

  h+='<div class="edit-actions"><button class="btn btn-sm" id="btnEditAC">Edit Performance</button>'+(user.role==='admin'?'<button class="btn btn-sm btn-danger" id="btnDelAC">Delete</button>':'')+'</div>';

async function saveAdCopy(id){
  const gv=function(i){const v=document.getElementById(i).value;return v!==''?parseFloat(v):null;};

    'Status':{type:'select',value:document.getElementById('e_st').value},

// ── Performance Bulk ──
function renderPerformance(){document.getElementById('mainContent').innerHTML=`<div class="section-hdr"><div><h2>Performance Update</h2><div class="sub">Bulk update from Ads Manager</div></div></div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.03)">
      <p style="font-size:13px;color:var(--text-m);margin-bottom:16px;line-height:1.6">Paste data — one line per ad or ad set:<br><code style="color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surface2);padding:2px 6px;border-radius:4px">Reference: CTR X%, CPA $X, ROAS Xx, Conv X, Spend $X</code></p>
      <textarea class="perf-input" id="perfInput" placeholder="1001 | H01B01H01: CTR 3.2%, CPA $12, ROAS 4.5x, Conv 47, Spend $560"></textarea>
      <div style="display:flex;gap:10px;margin-top:14px;align-items:center"><button class="btn btn-primary" onclick="runBulk()" id="perfBtn">Update Notion</button><span id="perfSt" style="font-size:12px;color:var(--text-m)"></span></div>
      <div id="perfRes"></div></div>`;}
async function runBulk(){const input=document.getElementById('perfInput').value.trim();if(!input)return;const btn=document.getElementById('perfBtn'),st=document.getElementById('perfSt'),resEl=document.getElementById('perfRes');btn.disabled=true;btn.textContent='Updating...';st.textContent='';
  const lines=input.split('\n').filter(function(l){return l.trim();}),results=[];const adcopy=await fd('adcopy'),adsets=await fd('adsets');
  for(let i=0;i<lines.length;i++){const line=lines[i];const ci=line.indexOf(':');if(ci===-1){results.push({line:line,status:'skipped'});continue;}
    const ref=line.substring(0,ci).trim(),ds=line.substring(ci+1).trim();
    const ex=function(p){const m=ds.match(p);return m?parseFloat(m[1].replace(/,/g,'')):null;};
    const ctr=ex(/CTR\s*([\d.]+)%/i),cpa=ex(/CPA?\s*\$?([\d.]+)/i),roas=ex(/ROAS\s*([\d.]+)/i),conv=ex(/Conv(?:ersions?)?\s*([\d,]+)/i),spend=ex(/Spend\s*\$?([\d,.]+)/i),imp=ex(/Imp(?:ressions?)?\s*([\d,]+)/i),clicks=ex(/Clicks?\s*([\d,]+)/i),cpm=ex(/CPM\s*\$?([\d.]+)/i);
    let m=adcopy.find(function(a){return a.name===ref||a.reference===ref;});
    if(m){const p={};if(ctr!=null)p['Results \u2014 CTR']={type:'number',value:ctr};if(cpa!=null)p['Results \u2014 CPA/CPL']={type:'number',value:cpa};if(roas!=null)p['Results \u2014 ROAS']={type:'number',value:roas};if(conv!=null)p['Results \u2014 Conversions']={type:'number',value:conv};st.textContent='Updating '+ref+'...';const r=await updateNotion(m.id,p);results.push({line:ref,status:r.success?'updated':'failed',type:'Ad Copy',cnt:Object.keys(p).length});continue;}
    m=adsets.find(function(a){return a.name===ref;});
    if(m){const p={};if(spend!=null)p['Results \u2014 Spend']={type:'number',value:spend};if(imp!=null)p['Results \u2014 Impressions']={type:'number',value:imp};if(clicks!=null)p['Results \u2014 Clicks']={type:'number',value:clicks};if(ctr!=null)p['Results \u2014 CTR']={type:'number',value:ctr};if(conv!=null)p['Results \u2014 Conversions']={type:'number',value:conv};if(cpa!=null)p['Results \u2014 CPL/CPA']={type:'number',value:cpa};if(roas!=null)p['Results \u2014 ROAS']={type:'number',value:roas};if(cpm!=null)p['Results \u2014 CPM']={type:'number',value:cpm};st.textContent='Updating '+ref+'...';const r=await updateNotion(m.id,p);results.push({line:ref,status:r.success?'updated':'failed',type:'Ad Set',cnt:Object.keys(p).length});continue;}
    results.push({line:ref,status:'not_found'});}
  btn.disabled=false;btn.textContent='Update Notion';const u=results.filter(function(r){return r.status==='updated';}).length,nf=results.filter(function(r){return r.status==='not_found';}).length,fl=results.filter(function(r){return r.status==='failed';}).length;
  st.textContent='Done \u2014 '+u+' updated, '+nf+' not found, '+fl+' failed';
  resEl.innerHTML='<div class="result-box"><div class="rlabel">Results</div><pre>'+results.map(function(r){const ic=r.status==='updated'?'\u2713':r.status==='not_found'?'?':'\u2717';const co=r.status==='updated'?'var(--green)':r.status==='not_found'?'var(--orange)':'var(--red)';return'<span style="color:'+co+'">'+ic+'</span> '+esc(r.line)+' \u2014 '+r.status+(r.type?' ('+r.type+')':'')+(r.cnt?' ['+r.cnt+' fields]':'');}).join('\n')+'</pre></div>';
  cache.adcopy=null;cache.adsets=null;cache.campaigns=null;}

// ── Delete ──
async function confirmDel(id,type){if(user.role!=='admin')return toast('Admin required',false);if(!confirm('Archive this in Notion?'))return;const r=await delNotion(id);if(r.success||r.archived){cache[type]=null;closePanel();render();toast('Deleted');}else toast('Delete failed',false);}

// ── Router ──
function render(){var m={overview:renderOverview,clients:renderClients,campaigns:renderCampaigns,adsets:renderAdSets,adcopy:renderAdCopy,performance:renderPerformance};(m[sec]||renderOverview)();}
